# 앱 전역 테마 — 다크 프리미엄. Streamlit 네이티브 테마라 모든 위젯에 안전하게 적용된다
# (DOM을 건드리지 않아 레이아웃 깨짐 위험이 없다). 색은 보라 액센트 + 딥 바이올렛-블랙.
[theme]
base = "dark"
primaryColor = "#8B5CF6"              # 보라 액센트 (버튼·포커스·프로그레스·링크)
backgroundColor = "#0E0C16"           # 본문 딥 바이올렛-블랙
secondaryBackgroundColor = "#17142A"  # 카드·입력·사이드바 표면
textColor = "#ECEAF5"
linkColor = "#A78BFA"
baseRadius = "large"                  # 위젯·카드 모서리 둥글게
borderColor = "#2A2740"
showSidebarBorder = true
